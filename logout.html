<!DOCTYPE html>
<html>
<head>
  <title>Logged out</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">    
</head>
<body>

<h1>Goodbye from Nanjumi. See you next time!</h1>

<nav class="navbar">
  <!-- LEFT SIDE -->
  <div class="nav-left">
    <a href="/">Home</a>
    <a href="/shop">Shop</a>
    <a href="/about">About</a>

    {% if logged_in %}
      <a href="/favorites">Favorites</a>
      <a href="/cart">Cart</a>
    {% endif %}
  </div>

  <!-- RIGHT SIDE -->
  <div class="nav-right">
    {% if not logged_in %}
      <a href="/login">Login</a>
    {% else %}
      <a href="/logout">Logout</a>
    {% endif %}
  </div>
</nav>

<p>You have been logged out.</p>

<a href="/">Back home</a>

</body>
</html>
