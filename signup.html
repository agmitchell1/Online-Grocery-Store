<!DOCTYPE html>
<html>
<head>
  <title>Signup</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">    
</head>
<body>

<h1>Welcome to Nanjumi</h1>

<nav class="navbar">
  <!-- LEFT SIDE -->
  <div class="nav-left">
    <a href="/">Home</a>
    <a href="/shop">Shop</a>
    <a href="/about">About</a>

    {% if logged_in %}
      <a href="/favorites">Favorites</a>
      <a href="/cart">Cart</a>
    {% endif %}
  </div>

  <!-- RIGHT SIDE -->
  <div class="nav-right">
    {% if not logged_in %}
      <a href="/login">Login</a>
    {% else %}
      <a href="/logout">Logout</a>
    {% endif %}
  </div>
</nav>


<h2>Signup</h2>

<form method="POST">
  <input name="username" placeholder="Username" required>
  <input name="password" type="password" placeholder="Password" required>
  <button type="submit">Sign up</button>
</form>

{% if error %}
  <p>{{ error }}</p>
{% endif %}

</body>
</html>
